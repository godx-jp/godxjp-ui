# CI gate for @godxjp/ui — mirrors the husky pre-commit gate and adds
# the Storybook play-test suite that runs in a real Chromium browser
# (too slow for pre-commit; gated here at PR review time per cardinal
# rule 12).
#
# Triggers on every PR and on push to `main`. Pass criteria:
#   • type-check clean
#   • token lint clean (7 rules)
#   • stories ↔ primitives parity green (rule 17)
#   • docs ↔ primitives parity green (rule 18)
#   • skill mirror parity (.claude/skills ↔ .codex/skills)
#   • `pnpm test:unit` green
#   • `pnpm test:stories` green (89 files, ~400 tests, ~10s)
#   • `pnpm build` produces clean dist with no leakage from dev deps
#
# Concurrency cancels stale runs when a PR is force-pushed.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Lint • Type-check • Parity • Test • Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        # Storybook play tests run in real Chromium via
        # @vitest/browser-playwright. Cache the binary across runs.
        run: pnpm exec playwright install --with-deps chromium

      - name: lint:tokens (7 rules)
        run: pnpm run lint:tokens

      - name: check:stories-parity (rule 17)
        run: pnpm run check:stories-parity

      - name: check:docs-parity (rule 18)
        run: pnpm run check:docs-parity

      - name: sync:skills parity (.claude ↔ .codex)
        run: pnpm run sync:skills

      - name: type-check
        run: pnpm run type-check

      - name: test:unit (Node)
        run: pnpm run test:unit

      - name: test:stories (Chromium browser)
        run: pnpm run test:stories

      - name: build (tsup)
        run: pnpm run build

      - name: Verify dist isolation (rule 26 §F)
        # Cardinal rule 26 forbids dev deps leaking into dist. Block CI
        # if @storybook / vitest / playwright ends up in the built JS.
        run: |
          if grep -r "@storybook\|vitest\|playwright" dist/ 2>/dev/null; then
            echo "::error::dist/ leaks dev deps — rule 26 violation"
            exit 1
          fi
          echo "✓ dist isolation OK"
