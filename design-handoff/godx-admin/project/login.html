<!doctype html>
<html lang="ja" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>godx-admin · Login & Device sign-in</title>
<meta name="viewport" content="width=1440"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="tokens-ext.css"/>
<style>
  html, body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans-jp); -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; }
  .col { display: flex; flex-direction: column; }
  .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
  .grow { flex: 1; min-width: 0; } .ml-auto { margin-left: auto; }
  .muted { color: var(--muted-foreground); }
  .pulse { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* brand color tweak: --brand-accent is bound via JS to whichever hex the
     user picks via Tweaks. Default is shu (朱 vermilion). */
  :root { --brand-accent: #eb6101; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="login-shell.jsx"></script>
<script type="text/babel" src="login-browser.jsx"></script>
<script type="text/babel" src="login-device.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "locale": "ja",
  "brand": "#eb6101",
  "density": "default"
}/*EDITMODE-END*/;

function TweaksUI({ tweaks, setTweak }) {
  if (!window.TweaksPanel) return null;
  const { TweaksPanel, TweakSection, TweakRadio, TweakColor } = window;
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="表示">
        <TweakRadio label="テーマ" value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
          options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]}/>
        <TweakRadio label="密度" value={tweaks.density} onChange={(v) => setTweak("density", v)}
          options={[{value:"compact",label:"密"},{value:"default",label:"標準"}]}/>
      </TweakSection>
      <TweakSection label="ロケール">
        <TweakRadio label="言語" value={tweaks.locale} onChange={(v) => setTweak("locale", v)}
          options={[{value:"ja",label:"日本語"},{value:"en",label:"EN"},{value:"vi",label:"VI"}]}/>
      </TweakSection>
      <TweakSection label="ブランド">
        <TweakColor label="アクセント (和色)" value={tweaks.brand}
          onChange={(v) => setTweak("brand", v)}
          options={["#eb6101", "#2d8a5c", "#4c6cb3", "#c98c00"]}/>
      </TweakSection>
    </TweaksPanel>
  );
}

function App() {
  const useT = window.useTweaks || (() => [TWEAK_DEFAULTS, () => {}]);
  const [tweaks, setTweak] = useT(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.dataset.density = tweaks.density;
    document.documentElement.style.setProperty("--brand-accent", tweaks.brand);
    document.documentElement.lang = tweaks.locale;
  }, [tweaks.theme, tweaks.density, tweaks.brand, tweaks.locale]);

  // Dummy nav handler — artboards show the whole flow, so screen transitions
  // aren't actually navigated (user's already seeing every state at once).
  // The Approved screen's primary CTA still redirects to godx-unified.html.
  useEffect(() => { window.__nextScreen = () => {}; }, []);

  const {
    DesignCanvas, DCSection, DCArtboard,
    ScreenEmail, ScreenPassword, ScreenMFA, ScreenPasskey, ScreenSSO,
    ScreenSignedIn,
    ScreenDevicePOS, ScreenDeviceKDS, ScreenDeviceCLI, ScreenDeviceCompleted,
    ScreenDeviceCodeEntry, ScreenDeviceAuthorize, ScreenDeviceApprovedBrowser,
    ScreenErrorExpired, ScreenErrorDenied, ScreenErrorWrongCode,
  } = window;

  // Wrap each artboard so its inner shell inherits the brand-accent token
  // even though it lives inside a fresh container.
  const lc = tweaks.locale;

  return (
    <>
      <DesignCanvas title="godx-admin · Sign-in flow" subtitle="Zitadel-style auth in godx wa-iro brand · 15 screens">

        <DCSection id="browser" title="① ブラウザでサインイン" subtitle="email → password → 2FA → success (with passkey & SSO alternatives)">
          <DCArtboard id="email"    label="A · Email entry"      width={480} height={720}><ScreenEmail locale={lc}/></DCArtboard>
          <DCArtboard id="password" label="B · Password"         width={480} height={720}><ScreenPassword locale={lc}/></DCArtboard>
          <DCArtboard id="mfa"      label="C · 2FA (TOTP)"       width={480} height={720}><ScreenMFA locale={lc}/></DCArtboard>
          <DCArtboard id="passkey"  label="D · Passkey"          width={480} height={720}><ScreenPasskey locale={lc}/></DCArtboard>
          <DCArtboard id="sso"      label="E · SSO chooser"      width={480} height={720}><ScreenSSO locale={lc}/></DCArtboard>
          <DCArtboard id="signed-in" label="F · Signed in →"     width={480} height={720}><ScreenSignedIn locale={lc}/></DCArtboard>
        </DCSection>

        <DCSection id="device-on-device" title="② デバイス側 — コードを表示" subtitle="POS · KDS · CLI が verify URL と user code を表示する">
          <DCArtboard id="pos"  label="A · POS (Tauri)"      width={760} height={500}><ScreenDevicePOS locale={lc}/></DCArtboard>
          <DCArtboard id="kds"  label="B · KDS (Kitchen)"    width={900} height={520}><ScreenDeviceKDS locale={lc}/></DCArtboard>
          <DCArtboard id="cli"  label="C · CLI (godx auth)"  width={760} height={460}><ScreenDeviceCLI locale={lc}/></DCArtboard>
          <DCArtboard id="pos-done" label="D · POS post-auth" width={760} height={500}><ScreenDeviceCompleted locale={lc}/></DCArtboard>
        </DCSection>

        <DCSection id="device-on-browser" title="③ ブラウザ側 — デバイスを承認" subtitle="ユーザーが verify.famgia.com/device でコードを入力し承認する">
          <DCArtboard id="entry"     label="A · Enter code"        width={520} height={720}><ScreenDeviceCodeEntry locale={lc}/></DCArtboard>
          <DCArtboard id="authorize" label="B · Review & approve"  width={520} height={720}><ScreenDeviceAuthorize locale={lc}/></DCArtboard>
          <DCArtboard id="approved"  label="C · Device approved →" width={480} height={720}><ScreenDeviceApprovedBrowser locale={lc}/></DCArtboard>
        </DCSection>

        <DCSection id="errors" title="④ エラー状態" subtitle="期限切れ・拒否・コード誤り — Zitadel が返す主要な失敗ケース">
          <DCArtboard id="expired"     label="A · Code expired"    width={480} height={640}><ScreenErrorExpired locale={lc}/></DCArtboard>
          <DCArtboard id="denied"      label="B · Sign-in denied"  width={480} height={640}><ScreenErrorDenied locale={lc}/></DCArtboard>
          <DCArtboard id="wrong-code"  label="C · Wrong code"      width={480} height={640}><ScreenErrorWrongCode locale={lc}/></DCArtboard>
        </DCSection>

      </DesignCanvas>
      <TweaksUI tweaks={tweaks} setTweak={setTweak}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
