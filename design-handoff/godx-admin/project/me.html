<!doctype html>
<html lang="ja" data-theme="light" data-tenant="kintai">
<head>
<meta charset="utf-8"/>
<title>godx-me · パーソナル</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="tokens-ext.css"/>
<link rel="stylesheet" href="console.css"/>
<link rel="stylesheet" href="me.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ui-kit.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="console-icons.jsx"></script>
<script type="text/babel" src="me-icons.jsx"></script>
<script type="text/babel" src="me-data.jsx"></script>
<script type="text/babel" src="me-shell.jsx"></script>
<script type="text/babel" src="me-screens-a.jsx"></script>
<script type="text/babel" src="me-screens-b.jsx"></script>
<script type="text/babel" src="me-screens-c.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "locale": "vi",
  "density": "compact",
  "sidebarCollapsed": false,
  "tenant": "kintai",
  "showInvitations": true,
  "userState": "active"
}/*EDITMODE-END*/;

function App() {
  const useT = window.useTweaks || (() => [TWEAK_DEFAULTS, () => {}]);
  const [tweaks, setTweak] = useT(TWEAK_DEFAULTS);
  const [route, setRoute] = useState("dashboard");

  const D = window.ME_DATA;

  // Empty-state simulation: a fresh sign-up has no orgs and one invite.
  const memberships = tweaks.userState === "empty" ? [] :
                      tweaks.userState === "invitedOnly" ? [] :
                      D.MEMBERSHIPS;
  const invitations = !tweaks.showInvitations ? [] :
                      tweaks.userState === "empty" ? [] :
                      D.INVITATIONS;

  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.dataset.density = tweaks.density;
    document.documentElement.dataset.tenant = tweaks.tenant;
    document.documentElement.lang = tweaks.locale;
  }, [tweaks.theme, tweaks.density, tweaks.tenant, tweaks.locale]);

  const setLocale  = (v) => setTweak("locale", v);
  const setTheme   = (v) => setTweak("theme", v);
  const setDensity = (v) => setTweak("density", v);

  const screen = (() => {
    switch (route) {
      case "dashboard":     return <window.MeDashboard     user={D.USER} memberships={memberships} invitations={invitations} payslips={D.PAYSLIPS} activity={D.ACTIVITY} services={D.SERVICES} setRoute={setRoute} locale={tweaks.locale}/>;
      case "profile":       return <window.MeProfile       user={D.USER}/>;
      case "contact":       return <window.MeContact       user={D.USER}/>;
      case "identity":      return <window.MeIdentity      user={D.USER}/>;
      case "orgs":          return <window.MeOrgs          memberships={memberships} services={D.SERVICES} setRoute={setRoute} openCreateOrg={() => alert("Create org modal (placeholder)")}/>;
      case "invitations":   return <window.MeInvitations   invitations={invitations} services={D.SERVICES} setRoute={setRoute}/>;
      case "payslips":      return <window.MePayslips      payslips={D.PAYSLIPS} memberships={D.MEMBERSHIPS} setRoute={setRoute}/>;
      case "tax":           return <window.MeTax           taxDocs={D.TAX_DOCS}/>;
      case "attendance":    return <window.MeAttendance    memberships={memberships}/>;
      case "services":      return <window.MeServices      memberships={memberships} services={D.SERVICES}/>;
      case "externals":     return <window.MeExternals     links={D.EXTERNAL_LINKS}/>;
      case "privacy":       return <window.MePrivacy       memberships={D.MEMBERSHIPS} privacyFields={D.PRIVACY_FIELDS} privacyGrants={D.PRIVACY_GRANTS}/>;
      case "security":      return <window.MeSecurity      user={D.USER} sessions={D.SESSIONS}/>;
      case "notifications": return <window.MeNotifications categories={D.NOTIF_CATEGORIES}/>;
      case "preferences":   return <window.MePreferences   user={D.USER} theme={tweaks.theme} setTheme={setTheme} density={tweaks.density} setDensity={setDensity} locale={tweaks.locale} setLocale={setLocale}/>;
      default:              return <window.MeDashboard     user={D.USER} memberships={memberships} invitations={invitations} payslips={D.PAYSLIPS} activity={D.ACTIVITY} services={D.SERVICES} setRoute={setRoute} locale={tweaks.locale}/>;
    }
  })();

  return (
    <>
      <div className="app-root me" data-collapsed={tweaks.sidebarCollapsed} data-screen-label={`route:${route}`}>
        <window.MeSidebar
          route={route}
          setRoute={setRoute}
          collapsed={tweaks.sidebarCollapsed}
          setCollapsed={(v) => setTweak("sidebarCollapsed", v)}
          user={D.USER}
          invitations={invitations}
        />
        <window.MeTopbar
          user={D.USER}
          locale={tweaks.locale}
          theme={tweaks.theme}
          setTheme={(v) => setTweak("theme", v)}
          invitations={invitations}
          setRoute={setRoute}
        />
        <main className="app-main">{screen}</main>
      </div>

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection label="ナビ">
            <window.TweakSelect label="現在画面" value={route} onChange={setRoute}
              options={[
                { value: "dashboard",     label: "マイページ" },
                { value: "profile",       label: "Account · プロフィール" },
                { value: "contact",       label: "Account · 連絡先" },
                { value: "identity",      label: "Account · 本人確認" },
                { value: "orgs",          label: "Memberships · 所属組織" },
                { value: "invitations",   label: "Memberships · 招待" },
                { value: "payslips",      label: "Records · 給与明細" },
                { value: "tax",           label: "Records · 源泉徴収票" },
                { value: "attendance",    label: "Records · 勤怠履歴" },
                { value: "services",      label: "Connections · サービス" },
                { value: "externals",     label: "Connections · 外部アカウント" },
                { value: "privacy",       label: "Settings · プライバシー" },
                { value: "security",      label: "Settings · セキュリティ" },
                { value: "notifications", label: "Settings · 通知" },
                { value: "preferences",   label: "Settings · 環境設定" },
              ]}/>
          </window.TweakSection>

          <window.TweakSection label="ユーザー状態">
            <window.TweakRadio label="シナリオ" value={tweaks.userState} onChange={(v) => setTweak("userState", v)}
              options={[
                { value: "active", label: "通常" },
                { value: "empty",  label: "未所属" },
              ]}/>
            <window.TweakToggle label="招待を表示" value={tweaks.showInvitations} onChange={(v) => setTweak("showInvitations", v)}/>
          </window.TweakSection>

          <window.TweakSection label="表示">
            <window.TweakRadio label="テーマ" value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
              options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]}/>
            <window.TweakRadio label="密度" value={tweaks.density} onChange={(v) => setTweak("density", v)}
              options={[{value:"compact",label:"密"},{value:"default",label:"標準"},{value:"comfortable",label:"広"}]}/>
            <window.TweakToggle label="サイドバー折畳み" value={tweaks.sidebarCollapsed} onChange={(v) => setTweak("sidebarCollapsed", v)}/>
          </window.TweakSection>

          <window.TweakSection label="ロケール / ブランド">
            <window.TweakRadio label="言語" value={tweaks.locale} onChange={(v) => setTweak("locale", v)}
              options={[{value:"ja",label:"日本語"},{value:"en",label:"EN"},{value:"vi",label:"VI"}]}/>
            <window.TweakSelect label="アクセント色" value={tweaks.tenant} onChange={(v) => setTweak("tenant", v)}
              options={[
                { value: "kintai", label: "Famgia (青)" },
                { value: "godx",   label: "godx (深青)" },
                { value: "betoya", label: "Betoya (緑)" },
                { value: "tempo",  label: "Tempo (紫)" },
              ]}/>
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
