<!doctype html>
<html lang="ja" data-theme="light" data-tenant="kintai">
<head>
<meta charset="utf-8"/>
<title>godx-admin · Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="tokens-ext.css"/>
<link rel="stylesheet" href="console.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ui-kit.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="console-icons.jsx"></script>
<script type="text/babel" src="console-data.jsx"></script>
<script type="text/babel" src="console-shell.jsx"></script>
<script type="text/babel" src="console-screens-a.jsx"></script>
<script type="text/babel" src="console-screens-b.jsx"></script>
<script type="text/babel" src="console-invite.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "locale": "ja",
  "density": "default",
  "sidebarCollapsed": false,
  "tenant": "kintai"
}/*EDITMODE-END*/;

function App() {
  const useT = window.useTweaks || (() => [TWEAK_DEFAULTS, () => {}]);
  const [tweaks, setTweak] = useT(TWEAK_DEFAULTS);

  const [route, setRoute] = useState("dashboard");
  const [openGroups, setOpenGroups] = useState({ org: true, billing: true });
  const [inviteOpen, setInviteOpen] = useState(false);

  const D = window.CONSOLE_DATA;

  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.dataset.density = tweaks.density;
    document.documentElement.dataset.tenant = tweaks.tenant;
    document.documentElement.lang = tweaks.locale;
  }, [tweaks.theme, tweaks.density, tweaks.tenant, tweaks.locale]);

  // Auto-open the parent group when navigating to a sub-route.
  useEffect(() => {
    if (route.startsWith("org-"))     setOpenGroups(g => ({ ...g, org: true }));
    if (route.startsWith("billing-")) setOpenGroups(g => ({ ...g, billing: true }));
  }, [route]);

  const openInvite = () => setInviteOpen(true);

  const screen = (() => {
    switch (route) {
      case "dashboard":     return <window.DashboardScreen org={D.ORG} user={D.USER} services={D.SERVICES} setRoute={setRoute} locale={tweaks.locale}/>;
      case "org-overview":  return <window.OrgOverviewScreen org={D.ORG} services={D.SERVICES} branches={D.BRANCHES} brands={D.BRANDS} members={D.MEMBERS} teams={D.TEAMS} setRoute={setRoute}/>;
      case "org-branches":  return <window.OrgBranchesScreen branches={D.BRANCHES} brands={D.BRANDS} locale={tweaks.locale}/>;
      case "org-brands":    return <window.OrgBrandsScreen brands={D.BRANDS}/>;
      case "org-members":   return <window.OrgMembersScreen members={D.MEMBERS} branches={D.BRANCHES} teams={D.TEAMS} services={D.SERVICES} openInvite={openInvite}/>;
      case "org-teams":     return <window.OrgTeamsScreen teams={D.TEAMS} members={D.MEMBERS} services={D.SERVICES}/>;
      case "org-access":    return <window.OrgServiceAccessScreen teams={D.TEAMS} services={D.SERVICES}/>;
      case "org-settings":  return <window.OrgSettingsScreen org={D.ORG}/>;
      case "services":      return <window.ServicesScreen services={D.SERVICES} setRoute={setRoute}/>;
      case "billing-manage":   return <window.BillingManageScreen org={D.ORG} services={D.SERVICES}/>;
      case "billing-invoices": return <window.BillingInvoicesScreen invoices={D.INVOICES}/>;
      default: return <window.DashboardScreen org={D.ORG} user={D.USER} services={D.SERVICES} setRoute={setRoute} locale={tweaks.locale}/>;
    }
  })();

  return (
    <>
      <div className="app-root console" data-collapsed={tweaks.sidebarCollapsed} data-screen-label={`route:${route}`}>
        <window.ConsoleSidebar
          route={route}
          setRoute={setRoute}
          collapsed={tweaks.sidebarCollapsed}
          setCollapsed={(v) => setTweak("sidebarCollapsed", v)}
          openGroups={openGroups}
          setOpenGroups={setOpenGroups}
        />
        <window.ConsoleTopbar
          user={D.USER}
          org={D.ORG}
          locale={tweaks.locale}
          theme={tweaks.theme}
          setTheme={(v) => setTweak("theme", v)}
        />
        <main className="app-main">{screen}</main>
      </div>

      <window.InviteModal
        open={inviteOpen}
        onClose={() => setInviteOpen(false)}
        branches={D.BRANCHES}
        teams={D.TEAMS}
        services={D.SERVICES}
      />

      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection label="表示">
            <window.TweakRadio label="テーマ" value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
              options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]}/>
            <window.TweakRadio label="密度" value={tweaks.density} onChange={(v) => setTweak("density", v)}
              options={[{value:"compact",label:"密"},{value:"default",label:"標準"},{value:"comfortable",label:"広"}]}/>
            <window.TweakToggle label="サイドバー折畳み" value={tweaks.sidebarCollapsed} onChange={(v) => setTweak("sidebarCollapsed", v)}/>
          </window.TweakSection>
          <window.TweakSection label="ロケール">
            <window.TweakRadio label="言語" value={tweaks.locale} onChange={(v) => setTweak("locale", v)}
              options={[{value:"ja",label:"日本語"},{value:"en",label:"EN"},{value:"vi",label:"VI"}]}/>
          </window.TweakSection>
          <window.TweakSection label="ブランド">
            <window.TweakSelect label="ブランド配色" value={tweaks.tenant} onChange={(v) => setTweak("tenant", v)}
              options={[
                { value: "kintai", label: "Famgia (青)" },
                { value: "godx",   label: "godx (深青)" },
                { value: "betoya", label: "Betoya (緑)" },
                { value: "tempo",  label: "Tempo (紫)" },
              ]}/>
          </window.TweakSection>
          <window.TweakSection label="ナビ">
            <window.TweakSelect label="現在画面" value={route} onChange={setRoute}
              options={[
                { value: "dashboard",        label: "Dashboard" },
                { value: "org-overview",     label: "Org · Overview" },
                { value: "org-branches",     label: "Org · Branches" },
                { value: "org-brands",       label: "Org · Brands" },
                { value: "org-members",      label: "Org · Members" },
                { value: "org-teams",        label: "Org · Teams" },
                { value: "org-access",       label: "Org · Service Access" },
                { value: "org-settings",     label: "Org · Settings" },
                { value: "services",         label: "Services" },
                { value: "billing-manage",   label: "Billing · Manage" },
                { value: "billing-invoices", label: "Billing · Invoices" },
              ]}/>
            <window.TweakButton label="Invite member modal" onClick={() => setInviteOpen(true)}/>
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
