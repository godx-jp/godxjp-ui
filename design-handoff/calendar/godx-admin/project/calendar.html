<!doctype html>
<html lang="vi" data-theme="light" data-tenant="godx" data-density="default">
<head>
<meta charset="utf-8"/>
<title>暦 Koyomi — Calendar · Famgia</title>
<meta name="viewport" content="width=1440"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="tokens-ext.css"/>
<style>
  html, body { margin: 0; background: #f0eee9; font-family: var(--font-sans-jp); color: var(--foreground); -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  #root { min-height: 100vh; }

  /* Calendar service accent — 浅葱 (asagi) teal, distinct from other godx services */
  :root {
    --cal-accent: oklch(55% 0.12 220);    /* asagi teal */
    --cal-accent-soft: color-mix(in oklch, var(--cal-accent) 14%, transparent);
  }
  [data-theme="dark"] {
    --cal-accent: oklch(70% 0.13 220);
  }

  /* Constrain page body inside artboard frames */
  .cal-frame {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    background: var(--background); color: var(--foreground);
    overflow: hidden;
  }
  .cal-body { flex: 1; display: flex; min-height: 0; overflow: hidden; }

  /* Modal backdrop */
  .modal-backdrop {
    position: absolute; inset: 0;
    background: color-mix(in oklch, oklch(20% 0.006 60) 25%, transparent);
    display: grid; place-items: center;
    padding: 24px;
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- shared kit -->
<script type="text/babel" src="ui-kit.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- calendar service -->
<script type="text/babel" src="calendar-data.jsx"></script>
<script type="text/babel" src="calendar-shell.jsx"></script>
<script type="text/babel" src="calendar-views.jsx"></script>
<script type="text/babel" src="calendar-extras.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "default",
  "theme": "light",
  "locale": "vi",
  "tenant": "godx",
  "weekStart": "mon",
  "showDeclined": false,
  "accent": "asagi"
}/*EDITMODE-END*/;

// Calendar service accent palette — curated, not free pick
const ACCENT_PALETTE = {
  asagi:    "oklch(55% 0.12 220)",   /* 浅葱 teal — default */
  ruri:     "oklch(48% 0.16 255)",   /* 瑠璃 lapis */
  wakatake: "oklch(58% 0.16 150)",   /* 若竹 green */
  shu:      "oklch(64% 0.18 50)",    /* 朱 vermilion */
  fuji:     "oklch(58% 0.14 295)",   /* 藤 wisteria */
};

function TweaksUI({ tweaks, setTweak }) {
  if (!window.TweaksPanel) return null;
  const { TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakToggle } = window;
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Hiển thị">
        <TweakRadio label="Density" value={tweaks.density} onChange={(v) => setTweak("density", v)}
          options={[{value:"compact",label:"密"},{value:"default",label:"標準"},{value:"comfortable",label:"広"}]}/>
        <TweakRadio label="Theme" value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
          options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]}/>
      </TweakSection>
      <TweakSection label="Lịch">
        <TweakRadio label="Bắt đầu tuần" value={tweaks.weekStart} onChange={(v) => setTweak("weekStart", v)}
          options={[{value:"mon",label:"Thứ 2"},{value:"sun",label:"CN"}]}/>
        <TweakToggle label="Hiện sự kiện đã từ chối" value={tweaks.showDeclined} onChange={(v) => setTweak("showDeclined", v)}/>
      </TweakSection>
      <TweakSection label="Màu nhận diện 暦">
        <TweakSelect label="Accent" value={tweaks.accent} onChange={(v) => setTweak("accent", v)}
          options={[
            {value:"asagi",    label:"浅葱 · teal (mặc định)"},
            {value:"ruri",     label:"瑠璃 · lapis"},
            {value:"wakatake", label:"若竹 · green"},
            {value:"shu",      label:"朱 · vermilion"},
            {value:"fuji",     label:"藤 · wisteria"},
          ]}/>
      </TweakSection>
      <TweakSection label="Ngôn ngữ">
        <TweakRadio label="Locale" value={tweaks.locale} onChange={(v) => setTweak("locale", v)}
          options={[{value:"vi",label:"VI"},{value:"ja",label:"JA"},{value:"en",label:"EN"}]}/>
      </TweakSection>
    </TweaksPanel>
  );
}
window.TweaksUI = TweaksUI;

// ── A self-contained calendar app frame (sidebar + topbar + body) ─────────
function CalendarApp({ view: initialView, locale, withDetail = false, selectedEventId: initSel }) {
  const D = window.CAL_DATA;
  const [view, setView] = useState(initialView || "week");
  const [selected, setSelected] = useState({ y: 2026, m: 5, d: 20 }); // Wed
  const [calendars, setCalendars] = useState(D.CALENDARS);
  const [eventOpen, setEventOpen] = useState(initSel || null);

  const toggleCal = (id) => setCalendars(cs => cs.map(c => c.id === id ? { ...c, shown: !c.shown } : c));

  // Pre-compute event-dot map for mini month
  const eventDots = useMemo(() => {
    const map = {};
    for (const e of D.EVENTS) map[e.date] = true;
    return map;
  }, []);

  // Title for topbar
  const title = (() => {
    if (view === "month") return locale === "ja" ? "5月 2026" : (locale === "vi" ? "Tháng 5, 2026" : "May 2026");
    if (view === "week") return locale === "ja" ? "5月 2026" : (locale === "vi" ? "18 – 24 tháng 5" : "May 18 – 24");
    if (view === "day") {
      const dow = ["CN","T2","T3","T4","T5","T6","T7"][new Date(2026, 4, selected.d).getDay()];
      return locale === "ja" ? `5月${selected.d}日 (水)` : (locale === "vi" ? `${selected.d}/5/2026 · Thứ tư` : `Wed, May ${selected.d}`);
    }
    return locale === "ja" ? "予定" : (locale === "vi" ? "Sắp tới" : "Up next");
  })();

  const ev = eventOpen ? D.EVENTS.find(e => e.id === eventOpen) : null;

  return (
    <div className="cal-frame">
      <window.CalTopbar
        titleMain={title}
        view={view}
        setView={setView}
        locale={locale}
        onPrev={() => {}}
        onNext={() => {}}
        onToday={() => setSelected({ y: 2026, m: 5, d: 20 })}
      />
      <div className="cal-body">
        <window.CalSidebar
          today={D.TODAY}
          selected={selected}
          onPick={setSelected}
          calendars={calendars}
          onToggleCal={toggleCal}
          eventDots={eventDots}
        />
        {view === "month" && <window.MonthView today={D.TODAY} selected={selected} events={D.EVENTS} calendars={calendars} locale={locale} onPickEvent={(e) => setEventOpen(e.id)}/>}
        {view === "week" && <window.WeekView today={D.TODAY} selected={selected} events={D.EVENTS} calendars={calendars} locale={locale} onPickEvent={(e) => setEventOpen(e.id)} selectedEventId={eventOpen}/>}
        {view === "day" && <window.DayView today={D.TODAY} selected={selected} events={D.EVENTS} calendars={calendars} locale={locale} onPickEvent={(e) => setEventOpen(e.id)} selectedEventId={eventOpen}/>}
        {view === "agenda" && <window.AgendaView today={D.TODAY} selected={selected} events={D.EVENTS} calendars={calendars} locale={locale} onPickEvent={(e) => setEventOpen(e.id)}/>}
        {withDetail && ev && <window.EventDetail ev={ev} calendars={calendars} locale={locale} onClose={() => setEventOpen(null)}/>}
      </div>
    </div>
  );
}

// ── Frame for the create-event modal — shows a faded calendar behind it ──
function CreateEventFrame() {
  const D = window.CAL_DATA;
  return (
    <div className="cal-frame" style={{ position: "relative" }}>
      <window.CalTopbar titleMain="Tháng 5, 2026" view="week" setView={() => {}} locale="vi"/>
      <div className="cal-body" style={{ filter: "blur(2px) saturate(.6)", opacity: 0.7, pointerEvents: "none" }}>
        <window.CalSidebar today={D.TODAY} selected={{y:2026,m:5,d:20}} calendars={D.CALENDARS} eventDots={{}} onPick={() => {}} onToggleCal={() => {}}/>
        <window.WeekView today={D.TODAY} selected={{y:2026,m:5,d:20}} events={D.EVENTS} calendars={D.CALENDARS} locale="vi" onPickEvent={() => {}}/>
      </div>
      <div className="modal-backdrop">
        <window.CreateEventModal calendars={D.CALENDARS}/>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const t = (window.useTweaks && window.useTweaks(TWEAK_DEFAULTS)) || [TWEAK_DEFAULTS, () => {}];
  const [tweaks, setTweak] = t;

  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.dataset.density = tweaks.density;
    document.documentElement.lang = tweaks.locale;
    document.documentElement.style.setProperty("--cal-accent", ACCENT_PALETTE[tweaks.accent] || ACCENT_PALETTE.asagi);
  }, [tweaks.theme, tweaks.density, tweaks.locale, tweaks.accent]);

  const { DesignCanvas, DCSection, DCArtboard } = window;
  if (!DesignCanvas) return <div style={{ padding: 40 }}>Loading…</div>;

  return (
    <>
      <DesignCanvas title="暦 Koyomi — Calendar service · Famgia">
        <DCSection id="primary" title="Calendar core" subtitle="3 chế độ xem chính cho service Lịch">
          <DCArtboard id="week" label="A · Tuần — view chính" width={1440} height={900}>
            <CalendarApp view="week" locale={tweaks.locale} selectedEventId="e-124"/>
          </DCArtboard>

          <DCArtboard id="month" label="B · Tháng" width={1440} height={900}>
            <CalendarApp view="month" locale={tweaks.locale}/>
          </DCArtboard>

          <DCArtboard id="day-detail" label="C · Ngày + Event detail panel" width={1440} height={900}>
            <CalendarApp view="day" locale={tweaks.locale} withDetail selectedEventId="e-124"/>
          </DCArtboard>
        </DCSection>

        <DCSection id="agenda" title="Agenda" subtitle="Danh sách lịch trình 2 tuần · cho người ít sự kiện, hoặc dùng trên mobile">
          <DCArtboard id="agenda" label="D · Lịch trình" width={1100} height={900}>
            <CalendarApp view="agenda" locale={tweaks.locale}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="flows" title="Tác vụ" subtitle="Tạo sự kiện · Tìm khung giờ chung">
          <DCArtboard id="create" label="E · Modal — Tạo sự kiện" width={1280} height={840}>
            <CreateEventFrame/>
          </DCArtboard>

          <DCArtboard id="find" label="F · Tìm khung giờ" width={1100} height={720}>
            <div style={{ padding: 24, width: "100%", height: "100%", background: "#f0eee9", display: "grid", placeItems: "stretch" }}>
              <window.FindATime/>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksUI tweaks={tweaks} setTweak={setTweak}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
