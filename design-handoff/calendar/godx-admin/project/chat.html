<!doctype html>
<html lang="vi" data-theme="light" data-tenant="godx" data-density="default">
<head>
<meta charset="utf-8"/>
<title>Godx Chat — Famgia</title>
<meta name="viewport" content="width=1440"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="tokens-ext.css"/>
<style>
  html, body { margin: 0; background: #f0eee9; font-family: var(--font-sans-jp); color: var(--foreground); -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  #root { min-height: 100vh; }

  /* Plugin animations */
  @keyframes popIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes badgePulse {
    0%, 100% { box-shadow: 0 0 0 3px var(--background), 0 0 0 3px var(--background); transform: scale(1); }
    50%      { box-shadow: 0 0 0 3px var(--background), 0 0 0 8px color-mix(in oklch, var(--error) 35%, transparent); transform: scale(1.04); }
  }
  @keyframes tdot {
    0%, 80%, 100% { opacity: 0.3; }
    40%           { opacity: 1; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- Existing kit -->
<script type="text/babel" src="ui-kit.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Chat product -->
<script type="text/babel" src="chat-data.jsx"></script>
<script type="text/babel" src="chat-full.jsx"></script>
<script type="text/babel" src="chat-main.jsx"></script>
<script type="text/babel" src="chat-plugin.jsx"></script>
<script type="text/babel" src="chat-settings.jsx"></script>
<script type="text/babel" src="chat-tenant-bg.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ── Tweak defaults ───────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "default",
  "theme": "light",
  "popupStyle": "window",
  "floatPosition": "br",
  "badgePulse": true,
  "showThread": true,
  "pluginTenant": "kintai",
  "tenant": "godx"
}/*EDITMODE-END*/;

function TweaksUI({ tweaks, setTweak }) {
  if (!window.TweaksPanel) return null;
  const { TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakToggle } = window;
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="表示 · Display">
        <TweakRadio label="Density" value={tweaks.density} onChange={(v) => setTweak("density", v)}
          options={[{value:"compact",label:"密"},{value:"default",label:"標準"},{value:"comfortable",label:"広"}]}/>
        <TweakRadio label="Theme" value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
          options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]}/>
        <TweakToggle label="Show thread panel" value={tweaks.showThread} onChange={(v) => setTweak("showThread", v)}/>
      </TweakSection>
      <TweakSection label="Floating chat plugin">
        <TweakSelect label="Popup style" value={tweaks.popupStyle} onChange={(v) => setTweak("popupStyle", v)}
          options={[
            {value:"window",     label:"Window (Intercom-style)"},
            {value:"drawer",     label:"Side drawer"},
            {value:"fullscreen", label:"Fullscreen overlay"},
          ]}/>
        <TweakRadio label="Float position" value={tweaks.floatPosition} onChange={(v) => setTweak("floatPosition", v)}
          options={[{value:"br",label:"↘"},{value:"bl",label:"↙"},{value:"tr",label:"↗"},{value:"tl",label:"↖"}]}/>
        <TweakToggle label="Pulse unread badge" value={tweaks.badgePulse} onChange={(v) => setTweak("badgePulse", v)}/>
        <TweakSelect label="Demo on tenant" value={tweaks.pluginTenant} onChange={(v) => setTweak("pluginTenant", v)}
          options={[
            {value:"kintai", label:"dxs-kintai"},
            {value:"betoya", label:"Betoya"},
            {value:"godx",   label:"godx-admin"},
          ]}/>
      </TweakSection>
    </TweaksPanel>
  );
}
window.TweaksUI = TweaksUI;

// ── Full chat product app ────────────────────────────────────────────
function ChatProduct({ density, showThread }) {
  const [workspaceId, setWorkspaceId] = useState("godx");
  const [activeChannelId, setActiveChannelId] = useState("ch-eng");
  const [openThread, setOpenThread] = useState(showThread ? "m9" : null);

  // Sync external toggle
  useEffect(() => { setOpenThread(showThread ? (openThread || "m9") : null); }, [showThread]);

  const channel = useMemo(
    () => (window.CHAT_CHANNELS[workspaceId] || []).find(c => c.id === activeChannelId)
         || (window.CHAT_CHANNELS[workspaceId] || [])[0],
    [workspaceId, activeChannelId]
  );

  const parentMsg = useMemo(
    () => window.CHAT_MESSAGES.find(m => m.id === openThread),
    [openThread]
  );

  return (
    <div style={{
      width: "100%", height: "100%",
      display: "flex",
      background: "var(--background)",
      overflow: "hidden",
    }}>
      <window.WorkspaceRail activeId={workspaceId} onPick={setWorkspaceId}/>
      <window.ChannelSidebar
        workspaceId={workspaceId}
        activeChannelId={activeChannelId}
        onPick={setActiveChannelId}
        density={density}
      />
      <main style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, background: "var(--background)" }}>
        <window.ChannelHeader
          channel={channel}
          threadOpen={!!openThread}
          onToggleThread={() => setOpenThread(openThread ? null : "m9")}
          density={density}
        />
        <window.MessageList
          messages={window.CHAT_MESSAGES}
          onOpenThread={setOpenThread}
          density={density}
        />
        <window.Composer channelName={channel ? channel.name : "general"} density={density}/>
      </main>
      {openThread && (
        <window.ThreadPanel
          parentMsg={parentMsg}
          onClose={() => setOpenThread(null)}
          density={density}
        />
      )}
    </div>
  );
}

// ── Plugin demo on tenant ───────────────────────────────────────────
function PluginDemo({ tenant, popupStyle, floatPosition, badgePulse }) {
  const Dash =
    tenant === "betoya" ? window.BetoyaDashboard :
    tenant === "godx"   ? window.BetoyaDashboard : // fallback for now — use Kintai for godx too
    window.KintaiDashboard;

  return (
    <div style={{ position: "relative", width: "100%", height: "100%", overflow: "hidden" }}>
      <window.TenantShell tenant={tenant}>
        {tenant === "betoya" ? <window.BetoyaDashboard/> : <window.KintaiDashboard/>}
      </window.TenantShell>
      <window.ChatPlugin
        unread={11}
        popupStyle={popupStyle}
        position={floatPosition}
        pulse={badgePulse}
        initialOpen={true}
      />
    </div>
  );
}

// ── Plugin states comparison (3 variants side-by-side) ─────────────
function PluginVariants() {
  const variants = [
    { id: "window",     label: "A · Window (default)", desc: "400×560 popup neo vào float button. Phù hợp cho desktop." },
    { id: "drawer",     label: "B · Drawer",          desc: "Trượt từ phải. Phù hợp khi cần xem cùng lúc với trang." },
    { id: "fullscreen", label: "C · Fullscreen",      desc: "Phủ toàn bộ. Mobile / focus mode." },
  ];
  return (
    <div style={{ display: "flex", gap: 24, padding: 24 }}>
      {variants.map(v => (
        <div key={v.id} style={{
          width: 360, height: 580, position: "relative",
          background: "var(--surface-2)", border: "1px solid var(--border)",
          borderRadius: 12, overflow: "hidden",
        }}>
          {/* Mini tenant bg preview */}
          <div style={{
            position: "absolute", inset: 0,
            background: `repeating-linear-gradient(135deg, var(--surface-3) 0 1px, transparent 1px 14px), var(--surface-2)`,
            opacity: 0.5,
          }}/>
          <div style={{ position: "absolute", top: 14, left: 14, right: 14, height: 28, borderRadius: 6, background: "var(--card)", border: "1px solid var(--border)" }}/>
          <window.ChatPlugin
            unread={11}
            popupStyle={v.id}
            position="br"
            pulse={true}
            initialOpen={true}
          />
          <div style={{ position: "absolute", bottom: -36, left: 0, right: 0, fontSize: 11, color: "var(--muted-foreground)", textAlign: "center" }}>
            {v.label}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────
function App() {
  const t = (window.useTweaks && window.useTweaks(TWEAK_DEFAULTS)) || [TWEAK_DEFAULTS, () => {}];
  const [tweaks, setTweak] = t;

  useEffect(() => {
    document.documentElement.dataset.theme   = tweaks.theme;
    document.documentElement.dataset.density = tweaks.density;
  }, [tweaks.theme, tweaks.density]);

  const { DesignCanvas, DCSection, DCArtboard } = window;

  if (!DesignCanvas) return <div style={{ padding: 40 }}>Loading…</div>;

  return (
    <>
      <DesignCanvas title="Godx Chat — Service & Plugin">
        <DCSection id="product" title="Godx Chat — Workspace" subtitle="Sản phẩm chat đầy đủ · trang riêng">
          <DCArtboard id="full" label="Full chat · #eng-platform + thread" width={1440} height={900}>
            <ChatProduct density={tweaks.density} showThread={tweaks.showThread}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="settings" title="Notification settings" subtitle="Mute · DND · keywords · schedule">
          <DCArtboard id="set" label="Settings · Notifications" width={1100} height={900}>
            <div style={{ width: "100%", height: "100%", display: "flex", background: "var(--background)" }}>
              <window.WorkspaceRail activeId="godx"/>
              <window.ChannelSidebar workspaceId="godx" activeChannelId="settings" density={tweaks.density}/>
              <main style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
                <header style={{
                  height: 56, padding: "0 16px",
                  borderBottom: "1px solid var(--border)",
                  display: "flex", alignItems: "center", gap: 12,
                }}>
                  <span style={{ width: 28, height: 28, borderRadius: 6, background: "var(--surface-3)", display: "grid", placeItems: "center" }}>{window.I.settings(14)}</span>
                  <div>
                    <h2 style={{ margin: 0, fontSize: 15, fontWeight: 600 }}>Preferences</h2>
                    <div style={{ fontSize: 11, color: "var(--muted-foreground)" }}>環境設定 · Notifications</div>
                  </div>
                </header>
                <window.ChatSettings/>
              </main>
            </div>
          </DCArtboard>
        </DCSection>

        <DCSection id="plugin" title="Floating chat plugin" subtitle="Mini popup gắn trên các sản phẩm tenant — bấm float button để mở">
          <DCArtboard id="plug-kintai" label={`Plugin on ${tweaks.pluginTenant} · ${tweaks.popupStyle}`} width={1280} height={820}>
            <PluginDemo
              tenant={tweaks.pluginTenant}
              popupStyle={tweaks.popupStyle}
              floatPosition={tweaks.floatPosition}
              badgePulse={tweaks.badgePulse}
            />
          </DCArtboard>
        </DCSection>

        <DCSection id="variants" title="Popup variants" subtitle="3 phong cách popup — chọn qua tweak panel">
          <DCArtboard id="vars" label="A · Window  /  B · Drawer  /  C · Fullscreen" width={1180} height={640}>
            <PluginVariants/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksUI tweaks={tweaks} setTweak={setTweak}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
