<!doctype html>
<html lang="ja" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>godx-admin · サインイン</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="tokens-ext.css"/>
<style>
  html, body, #root { margin: 0; height: 100%; background: var(--background); color: var(--foreground); font-family: var(--font-sans-jp); -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  .row { display: flex; } .col { display: flex; flex-direction: column; }
  .gap-1 { gap: 4px; } .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; }
  .grow { flex: 1; min-width: 0; } .ml-auto { margin-left: auto; }
  .muted { color: var(--muted-foreground); }
  .pulse { animation: blink 1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  :root { --brand-accent: #eb6101; }

  /* Smooth crossfade as the user steps through screens */
  .signin-step { animation: stepin 240ms ease-out; }
  @keyframes stepin {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="login-shell.jsx"></script>
<script type="text/babel" src="login-browser.jsx"></script>
<script type="text/babel" src="login-device.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "locale": "ja",
  "brand": "#eb6101",
  "method": "password"
}/*EDITMODE-END*/;

function App() {
  const useT = window.useTweaks || (() => [TWEAK_DEFAULTS, () => {}]);
  const [tweaks, setTweak] = useT(TWEAK_DEFAULTS);

  // ── Sign-in flow state machine ─────────────────────────────────────
  // step keys: "email" → "password" | "passkey" | "sso" → "mfa" (password only) → "done"
  const [step, setStep] = useState("email");

  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme;
    document.documentElement.style.setProperty("--brand-accent", tweaks.brand);
    document.documentElement.lang = tweaks.locale;
  }, [tweaks.theme, tweaks.brand, tweaks.locale]);

  // Wire screen components' "next" callbacks.
  // Each Screen* component calls window.__nextScreen(target) when its
  // primary CTA fires; this is the single place that owns step transitions.
  useEffect(() => {
    window.__nextScreen = (target) => {
      // "done-browser" sentinel from the screens means "auth done, redirect"
      if (target === "done-browser" || target === "signed-in") {
        setStep("done");
        // Small delay so the user sees the success state, then redirect.
        setTimeout(() => { window.location.href = "godx-unified.html"; }, 1200);
        return;
      }
      setStep(target);
    };
  }, []);

  // When "method" tweak changes, jump straight to that flow's first prompt
  // — handy for demoing without typing through email every time.
  useEffect(() => {
    if (tweaks.method === "password") setStep("email");
    if (tweaks.method === "passkey")  setStep("passkey");
    if (tweaks.method === "sso")      setStep("sso");
    if (tweaks.method === "mfa")      setStep("mfa");
  }, [tweaks.method]);

  const Screens = {
    email:    window.ScreenEmail,
    password: window.ScreenPassword,
    mfa:      window.ScreenMFA,
    passkey:  window.ScreenPasskey,
    sso:      window.ScreenSSO,
    done:     window.ScreenSignedIn,
  };
  const Current = Screens[step] || window.ScreenEmail;

  return (
    <>
      <div className="signin-step" key={step} style={{ height: "100%" }}>
        <Current locale={tweaks.locale}/>
      </div>
      {window.TweaksPanel && (
        <window.TweaksPanel title="Tweaks">
          <window.TweakSection label="表示">
            <window.TweakRadio label="テーマ" value={tweaks.theme} onChange={(v) => setTweak("theme", v)}
              options={[{value:"light",label:"Light"},{value:"dark",label:"Dark"}]}/>
          </window.TweakSection>
          <window.TweakSection label="ロケール">
            <window.TweakRadio label="言語" value={tweaks.locale} onChange={(v) => setTweak("locale", v)}
              options={[{value:"ja",label:"日本語"},{value:"en",label:"EN"},{value:"vi",label:"VI"}]}/>
          </window.TweakSection>
          <window.TweakSection label="ブランド">
            <window.TweakColor label="アクセント (和色)" value={tweaks.brand}
              onChange={(v) => setTweak("brand", v)}
              options={["#eb6101", "#2d8a5c", "#4c6cb3", "#c98c00"]}/>
          </window.TweakSection>
          <window.TweakSection label="デモ">
            <window.TweakSelect label="サインイン方法へジャンプ" value={tweaks.method}
              onChange={(v) => setTweak("method", v)}
              options={[
                { value: "password", label: "Email → Password → 2FA" },
                { value: "passkey",  label: "Passkey 直接" },
                { value: "sso",      label: "SSO 直接" },
                { value: "mfa",      label: "2FA 画面" },
              ]}/>
            <div style={{ fontSize: 11, color: "var(--muted-foreground)", padding: "6px 4px", lineHeight: 1.5 }}>
              現在のステップ: <code style={{ fontFamily: "var(--font-mono)" }}>{step}</code>
            </div>
          </window.TweakSection>
        </window.TweaksPanel>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
