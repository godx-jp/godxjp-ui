<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:10px">Spacing scale · 4px grid</div>
  <div style="display:flex;align-items:flex-end;gap:10px;height:80px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:4px;height:4px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">1·4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:8px;height:8px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">2·8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:12px;height:12px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">3·12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:16px;height:16px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">4·16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:20px;height:20px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">5·20</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:24px;height:24px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">6·24</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:32px;height:32px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">8·32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:40px;height:40px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">10·40</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:48px;height:48px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">12·48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:64px;height:64px;background:var(--primary);border-radius:2px"></div><div class="muted mono" style="font-size:9px">16·64</div></div>
  </div>
</body></html>
