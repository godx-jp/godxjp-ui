<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:10px">Layout tokens · sticky chrome</div>
  <div style="display:grid;grid-template-columns:auto 1fr;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;height:140px">
    <div style="width:160px;background:var(--secondary);padding:10px 12px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px">
      <div style="font-size:11px;font-weight:600">サイドバー</div>
      <div class="muted mono" style="font-size:9px">--sidebar-width</div>
      <div class="muted mono" style="font-size:9px">16rem · 256px</div>
      <div class="muted mono" style="font-size:9px;margin-top:6px">collapsed: 4rem · 64</div>
    </div>
    <div style="display:flex;flex-direction:column">
      <div style="height:36px;background:var(--background);border-bottom:1px solid var(--border);padding:0 12px;display:flex;align-items:center;font-size:11px;gap:8px">
        <div style="font-weight:500">トップバー</div>
        <div class="muted mono" style="font-size:9px">--header-height · 3rem · 48px</div>
      </div>
      <div style="padding:10px 12px;flex:1;background:var(--background);font-size:11px">
        <div class="muted mono" style="font-size:9px">--container-max-width · 1280px</div>
        <div class="muted mono" style="font-size:9px">--content-sidebar-width · 20rem · 320px</div>
      </div>
    </div>
  </div>
</body></html>
