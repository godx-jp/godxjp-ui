<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:12px">Neutrals — warm hue 60 (off-white → off-black). SmartHR convergent.</div>
  <div class="sw-row" style="grid-template-columns:repeat(6, 1fr)">
    <div class="sw-cell"><div class="sw" style="background:var(--background);border-color:var(--border)"></div>
      <div class="name">background</div><div class="val">99% .002</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--secondary);border-color:var(--border)"></div>
      <div class="name">secondary</div><div class="val">96% .004</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--accent);border-color:var(--border)"></div>
      <div class="name">accent</div><div class="val">93% .005</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--border);border-color:transparent"></div>
      <div class="name">border</div><div class="val">86% .006</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--muted-foreground)"></div>
      <div class="name">muted-fg</div><div class="val">48% .008 · TEXT_GREY</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--foreground)"></div>
      <div class="name">foreground</div><div class="val">20% .006 · TEXT_BLACK</div></div>
  </div>
</body></html>
