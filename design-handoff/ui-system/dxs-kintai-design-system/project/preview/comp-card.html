<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:12px">Card surface · 1px border + 16px padding (no shadow at rest)</div>
  <div class="card" style="max-width:340px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-weight:500;font-size:14px">今月の勤怠</div>
      <span class="chip chip-success">承認済</span>
    </div>
    <div style="font-size:24px;font-weight:600;letter-spacing:-0.01em">168.5h</div>
    <div class="muted" style="margin-top:2px;font-size:12px">5月 · 22 営業日</div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-sm">詳細</button>
      <button class="btn btn-outline btn-sm">エクスポート</button>
    </div>
  </div>
</body></html>
