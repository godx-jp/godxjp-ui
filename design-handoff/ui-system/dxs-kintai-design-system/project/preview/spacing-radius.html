<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:12px">Radius · 6px base (radius-lg)</div>
  <div style="display:flex;gap:14px;align-items:flex-end">
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--secondary);border:1px solid var(--border);border-radius:2px"></div><div class="muted mono" style="font-size:10px;margin-top:4px">sm · 2</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--secondary);border:1px solid var(--border);border-radius:4px"></div><div class="muted mono" style="font-size:10px;margin-top:4px">md · 4</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--secondary);border:1px solid var(--border);border-radius:6px"></div><div class="muted mono" style="font-size:10px;margin-top:4px">lg · 6 (base)</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--secondary);border:1px solid var(--border);border-radius:10px"></div><div class="muted mono" style="font-size:10px;margin-top:4px">xl · 10</div></div>
    <div style="text-align:center"><div style="width:64px;height:64px;background:var(--secondary);border:1px solid var(--border);border-radius:9999px"></div><div class="muted mono" style="font-size:10px;margin-top:4px">full</div></div>
  </div>
</body></html>
