<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:12px">Semantic — never substitute, never recolor</div>
  <div class="sw-row" style="grid-template-columns:repeat(5, 1fr)">
    <div class="sw-cell"><div class="sw" style="background:var(--success)"></div>
      <div class="name">success · 若竹</div><div class="val">#68be8d</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--warning)"></div>
      <div class="name">warning · 山吹</div><div class="val">#f8b500</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--info)"></div>
      <div class="name">info · 群青</div><div class="val">#4c6cb3</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--attention)"></div>
      <div class="name">attention · 朱</div><div class="val">#eb6101</div></div>
    <div class="sw-cell"><div class="sw" style="background:var(--destructive)"></div>
      <div class="name">danger · 茜</div><div class="val">#b7282e</div></div>
  </div>
  <div class="muted" style="margin-top:12px;font-size:11px;line-height:1.5">
    Cited rule — 「新しめのデザインを採用しているサービスほど赤は避けるか、控えめに」
    Use <b style="color:var(--attention)">attention (朱)</b> for non-critical alerts; reserve
    <b style="color:var(--destructive)">danger (茜)</b> for destructive actions.
  </div>
</body></html>
