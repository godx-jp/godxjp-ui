<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:12px">Gray scale · neutral utility (Tailwind tokens)</div>
  <div class="sw-row" style="grid-template-columns:repeat(10, 1fr);gap:6px">
    <div class="sw-cell"><div class="sw" style="background:#f9fafb;height:36px"></div><div class="name">50</div></div>
    <div class="sw-cell"><div class="sw" style="background:#f3f4f6;height:36px"></div><div class="name">100</div></div>
    <div class="sw-cell"><div class="sw" style="background:#e5e7eb;height:36px"></div><div class="name">200</div></div>
    <div class="sw-cell"><div class="sw" style="background:#d1d5db;height:36px"></div><div class="name">300</div></div>
    <div class="sw-cell"><div class="sw" style="background:#9ca3af;height:36px"></div><div class="name">400</div></div>
    <div class="sw-cell"><div class="sw" style="background:#6b7280;height:36px"></div><div class="name">500</div></div>
    <div class="sw-cell"><div class="sw" style="background:#4b5563;height:36px"></div><div class="name">600</div></div>
    <div class="sw-cell"><div class="sw" style="background:#374151;height:36px"></div><div class="name">700</div></div>
    <div class="sw-cell"><div class="sw" style="background:#1f2937;height:36px"></div><div class="name">800</div></div>
    <div class="sw-cell"><div class="sw" style="background:#111827;height:36px"></div><div class="name">900</div></div>
  </div>
  <div class="label" style="margin:14px 0 8px">Blue palette · active states</div>
  <div class="sw-row" style="grid-template-columns:repeat(5, 1fr)">
    <div class="sw-cell"><div class="sw" style="background:#eff6ff"></div><div class="name">blue-50</div><div class="val">#eff6ff</div></div>
    <div class="sw-cell"><div class="sw" style="background:#dbeafe"></div><div class="name">blue-100</div><div class="val">#dbeafe</div></div>
    <div class="sw-cell"><div class="sw" style="background:#3b82f6"></div><div class="name">blue-500</div><div class="val">#3b82f6</div></div>
    <div class="sw-cell"><div class="sw" style="background:#2563eb"></div><div class="name">blue-600</div><div class="val">#2563eb</div></div>
    <div class="sw-cell"><div class="sw" style="background:#1d4ed8"></div><div class="name">blue-700</div><div class="val">#1d4ed8</div></div>
  </div>
</body></html>
