<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 22px">
  <div class="label" style="margin-bottom:14px">Shadow elevation</div>
  <div style="display:grid;grid-template-columns:repeat(5, 1fr);gap:18px;padding:8px 4px 18px">
    <div style="text-align:center"><div style="width:80px;height:50px;background:var(--card);border-radius:6px;box-shadow:var(--shadow-sm);margin:0 auto"></div><div class="muted mono" style="font-size:10px;margin-top:6px">sm</div></div>
    <div style="text-align:center"><div style="width:80px;height:50px;background:var(--card);border-radius:6px;box-shadow:var(--shadow);margin:0 auto"></div><div class="muted mono" style="font-size:10px;margin-top:6px">base</div></div>
    <div style="text-align:center"><div style="width:80px;height:50px;background:var(--card);border-radius:6px;box-shadow:var(--shadow-md);margin:0 auto"></div><div class="muted mono" style="font-size:10px;margin-top:6px">md · cards</div></div>
    <div style="text-align:center"><div style="width:80px;height:50px;background:var(--card);border-radius:6px;box-shadow:var(--shadow-lg);margin:0 auto"></div><div class="muted mono" style="font-size:10px;margin-top:6px">lg · popovers</div></div>
    <div style="text-align:center"><div style="width:80px;height:50px;background:var(--card);border-radius:6px;box-shadow:var(--shadow-xl);margin:0 auto"></div><div class="muted mono" style="font-size:10px;margin-top:6px">xl · dialog</div></div>
  </div>
  <div class="muted" style="font-size:11px">Elevation is restrained — cards prefer <span class="mono">border</span> over shadow.</div>
</body></html>
