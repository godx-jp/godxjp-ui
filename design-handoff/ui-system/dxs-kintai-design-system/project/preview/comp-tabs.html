<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:12px">Tabs · radix-style underline</div>
  <div style="display:flex;border-bottom:1px solid var(--border);gap:4px">
    <div style="padding:8px 12px;font-size:13px;font-weight:500;border-bottom:2px solid var(--primary);color:var(--foreground);margin-bottom:-1px">カレンダー</div>
    <div style="padding:8px 12px;font-size:13px;color:var(--muted-foreground)">リスト</div>
    <div style="padding:8px 12px;font-size:13px;color:var(--muted-foreground)">変更申請 <span class="chip chip-destructive" style="height:16px;font-size:10px;margin-left:4px;padding:0 5px">2</span></div>
  </div>
  <div style="padding:14px 0;font-size:13px;color:var(--muted-foreground)">タブ内容（カレンダーグリッド · リスト · 申請）— 個別データを表示。</div>
  <div class="label" style="margin-top:8px">Pills variant</div>
  <div style="display:flex;gap:4px;background:var(--secondary);padding:3px;border-radius:6px;width:fit-content">
    <div style="padding:4px 10px;font-size:12px;background:var(--background);border-radius:4px;font-weight:500;box-shadow:var(--shadow-sm)">日</div>
    <div style="padding:4px 10px;font-size:12px;color:var(--muted-foreground)">週</div>
    <div style="padding:4px 10px;font-size:12px;color:var(--muted-foreground)">月</div>
  </div>
</body></html>
