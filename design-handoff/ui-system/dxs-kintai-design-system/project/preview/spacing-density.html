<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:18px 20px">
  <div class="label" style="margin-bottom:12px">Density · element heights (button / input / select)</div>
  <div style="display:grid;grid-template-columns:repeat(3, 1fr);gap:14px">
    <div>
      <div class="muted mono" style="font-size:10px;margin-bottom:6px">data-density="compact" · 28px default</div>
      <div data-density="compact" style="display:flex;flex-direction:column;gap:4px">
        <button class="btn btn-xs">xs · 20</button>
        <button class="btn btn-sm">sm · 24</button>
        <button class="btn">md · 28</button>
      </div>
    </div>
    <div>
      <div class="muted mono" style="font-size:10px;margin-bottom:6px">default · 32px</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="btn btn-xs">xs · 24</button>
        <button class="btn btn-sm">sm · 28</button>
        <button class="btn">md · 32</button>
      </div>
    </div>
    <div>
      <div class="muted mono" style="font-size:10px;margin-bottom:6px">data-density="comfortable" · 44px (WCAG)</div>
      <div data-density="comfortable" style="display:flex;flex-direction:column;gap:4px">
        <button class="btn btn-xs">xs · 32</button>
        <button class="btn btn-sm">sm · 36</button>
        <button class="btn">md · 44</button>
      </div>
    </div>
  </div>
</body></html>
